<!DOCTYPE html>
<html lang="fr">
<head th:replace="~{fragments :: head}"></head>
<body>

    <header th:replace="~{fragments :: header}"></header>

    <main>
        <div class="action-bar">
            <h2>Accueil</h2>
            
            <form method="GET" action="http://localhost:9090/rocmovies/home" class="filter-group">
                <select name="style">
                    <option value="">Tous les styles</option>
                    <option th:each="style: ${movie_styles}" th:text="${style.getName()}" th:value="${style.getId()}"></option>
                </select>
                <button type="submit" class="btn-submit">Filtrer</button>
            </form>
        </div>
        <div class="flex-row">
            <a class="movie-button" th:href="@{/{id}(id=${movie.idMovie})}" th:each="movie: ${movies}">
                <div class="movie-card">
                    <img th:if="${movie.image != null and movie.image != ''}" 
                         th:src="${movie.image}" 
                         th:alt="${movie.title}" />

                    <div th:unless="${movie.image != null and movie.image != ''}" class="no-pic">
                        <i class="fa-solid fa-image"></i>
                    </div>
                
                    <div class="movie-info">
                        <p class="movie-genre" th:text="${movie.style.name}"></p>
                        <p class="movie-title" th:text="${movie.title}"></p>
                        <p class="movie-meta" th:text="${movie.productionYear}"></p>
                    </div>
                </div>
            </a>
        </div>
    </main>
</body>
</html>
