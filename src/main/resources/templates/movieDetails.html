<!DOCTYPE html>
<html lang="fr">
<head th:replace="fragments :: head"></head>
<body>

<header th:replace="fragments :: header"></header>

<main>
    <h2>Détails du film</h2>

    <!-- Loader tant que movie n'est pas encore dans le modèle -->
    <div th:if="${movie == null}"><p>Chargement du film...</p></div>

    <!-- Film introuvable (movie existe mais est vide) -->
    <div class="movie-details" th:if="${movie != null}">
        <h3 th:text="${movie.title}">Titre du film</h3>
        <p th:if="${movie.style != null}">
            <strong>Style :</strong>
            <span th:text="${movie.style.name}">Style du film</span>
        </p>
        <p>
            <strong>Année de production :</strong>
            <span th:text="${movie.productionYear}">Année</span>
        </p>
        <a href="/rocmovies/home" class="btn">Retour à la liste des films</a>
    </div>
</main>

</body>
</html>
